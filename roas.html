<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;background:#f3f4f6;color:#1e293b;font-size:15px}
.hdr{background:linear-gradient(135deg,#065a82,#1b9aaa);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:20px;font-weight:700}

.hdr .nav-link:hover{opacity:1;background:rgba(255,255,255,.15)}

.btn-group{display:flex;gap:4px;flex-wrap:wrap}
.btn-svc{padding:5px 12px;border:1px solid #d1d5db;border-radius:16px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s}

.filter-row{background:#fff;padding:10px 24px;border-bottom:1px solid #e5e7eb;display:flex;gap:12px;flex-wrap:wrap;align-items:center}

.ct{max-width:1440px;margin:0 auto;padding:20px 24px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi .lb{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px}
.kpi .vl{font-size:24px;font-weight:700;color:#0f172a;margin:4px 0 2px}
.kpi .sb{font-size:11px;color:#9ca3af}
.kpi.green .vl{color:#16a34a}
.kpi.red .vl{color:#dc2626}
.kpi.blue .vl{color:#065a82}

.sec{background:#fff;border-radius:10px;padding:18px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sec h2{font-size:15px;font-weight:700;margin-bottom:14px;color:#1e293b;display:flex;align-items:center;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.funnel{display:flex;flex-direction:column;gap:5px}
.f-step{display:flex;align-items:center;gap:10px}
.f-bar{height:36px;border-radius:5px;display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:600;font-size:13px;min-width:50px;transition:width .5s ease}
.f-meta{font-size:12px;color:#6b7280;min-width:180px}
.f-meta strong{color:#0f172a}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f9fafb;padding:9px 10px;text-align:left;font-weight:600;color:#6b7280;border-bottom:2px solid #e5e7eb;font-size:12px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f3f4f6}
tr:hover{background:#f9fafb}
.tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600}
.tg{background:#dcfce7;color:#166534}
.tr{background:#fee2e2;color:#991b1b}

.to{background:#ffedd5;color:#9a3412}
.roas-big{font-size:22px;font-weight:700}
canvas{max-height:280px}
.loading{text-align:center;padding:60px;color:#9ca3af;font-size:15px}
.utm-tag{background:#f0f9ff;color:#065a82;border:1px solid #bae6fd;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:500;margin-left:4px}
.empty{text-align:center;padding:40px;color:#9ca3af;font-size:14px}
.toggle-view{display:flex;gap:4px;margin-left:auto}
.toggle-view button{padding:4px 10px;border:1px solid #d1d5db;border-radius:4px;background:#fff;cursor:pointer;font-size:11px}
.toggle-view button.active{background:#065a82;color:#fff;border-color:#065a82}
.dark body{background:#111827;color:#e5e7eb}
.dark .hdr{background:linear-gradient(135deg,#0c4a6e,#155e75)}
.dark .controls,.dark .filter-row,.dark .period-row{background:#1f2937;border-color:#374151}
.dark .controls label,.dark .filter-row label,.dark .period-row label{color:#9ca3af}
.dark .btn-svc{background:#374151;border-color:#4b5563;color:#d1d5db}

.dark .kpi,.dark .sec{background:#1f2937;box-shadow:none}
.dark .kpi .lb{color:#9ca3af}

.dark td{border-color:#374151}
.dark tr:hover{background:#111827}
.dark .filter-row select,.dark .filter-row input,.dark .period-row input{background:#374151;color:#e5e7eb;border-color:#4b5563}
.dark .preset{background:#374151;color:#d1d5db;border-color:#4b5563}
.dark .preset.active{background:#065a82;color:#fff}
</style>

const BASE='https://paaspocosartesianos-cmd.github.io/dashboard-paas/data/';
let DEALS=[],ADS={},GADS={},curSvc='TODOS',curPlat='TODOS',search='',curUtm='',curFonte='',dtStart=null,dtEnd=null;
let pieChart=null,barChart=null;

const SVC_KW={
  'POCO':['poco','po\u00e7o','well','artesian','litoral','artesiano'],
  'OUTORGA':['outorga','grant','licen'],
  'IRRIGACAO':['irriga','irrigation'],
  'FILTRO':['filtro','filter','filtr'],
  'HIDRO':['hidro','hidropaas','hidropas'],
  'SONDAGEM':['sondagem','spt','geotec'],
  'MONITORAMENTO':12px">Busca:</label>

    <button class="preset" data-days="90">90d</button>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
const BASE='https://paaspocosartesianos-cmd.github.io/dashboard-paas/data/';
let DEALS=[],ADS={},GADS={},curSvc='TODOS',curPlat='TODOS',search='',curUtm='',curFonte='',dtStart=null,dtEnd=null;
let pieChart=null,barChart=null;

const SVC_KW={
  'POCO':['poco','po\u00e7o','well','artesian','litoral','artesiano'],
  'OUTORGA':['outorga','grant','licen'],
  'IRRIGACAO':['irriga','irrigation'],
  'FILTRO':['filtro','filter','filtr'],
  'HIDRO':['hidro','hidropaas','hidropas'],
  'SONDAGEM':['sondagem','spt','geotec'],
  'MONITORAMENTO':['monitor','quali','monit'],
  'WHATSAPP':['whatsapp','whats','wpp','engajamento']
};

function mSvc(text,svc){
  if(svc==='TODOS')return true;
  if(!text||typeof text!=='string')return false;
  try{const t=text.toLowerCase();return(SVC_KW[svc]||[svc.toLowerCase()]).some(k=>t.includes(k));}catch(e){return false;}
}
function detectCampSvc(name){
  for(const svc of Object.keys(SVC_KW)){if(mSvc(name,svc))return svc;}
  return 'OTHER';
}
function isPaidSource(d){
  const fo=(d.fo||'').toLowerCase();
  const c=(d.c||'').toLowerCase();
  if(fo.includes('recorrente')||fo.includes('cliente recorrente'))return false;
  if(fo.includes('orgÃ¢nic')||fo.includes('organico')||fo.includes('whatsapp org'))return false;
  if(fo.includes('indicaÃ§Ã£o')||fo.includes('indica')||fo==='ligaÃ§Ã£o')return false;
  if(fo.includes('trÃ¡fego direto')||fo.includes('presencial')||fo.includes('visita'))return false;
  if(fo.includes('prospecÃ§Ã£o')||fo.includes('cliente presencial'))return false;
  if(fo.includes('contato por telefone')||fo.includes('contato por e-mail'))return false;
  if(fo.includes('social | instagram')&&!fo.includes('pag'))return false;
  if(fo.includes('busca paga')||fo.includes('pag')||fo.includes('googleads')||fo.includes('facebook'))return true;
  if(c&&c.includes('trafego direto'))return false;
  if(c&&(c.includes('cadastro')||c.includes('trafego')||c.includes('lead')||c.includes('engajamento')))return true;
  if(fo.includes('redes sociais'))return false;
  if(fo.includes('referÃªncia'))return false;
  if(!fo||fo==='desconhecido'||fo==='(vazio)')return false;
  if(fo.includes('email |'))return false;
  return false;
}
function mSearch(text){
  if(!search)return true;
  return(text||'').toLowerCase().includes(search.toLowerCase());
}
function fmt(v){return'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fN(v){return(v||0).toLocaleString('pt-BR')}
function pct(a,b){return b>0?(a/b*100).toFixed(1)+'%':'0%'}
function parseD(s){if(!s)return null;if(s.includes('T'))return new Date(s);const p=s.split(/[-/]/);return p.length===3?new Date(p[0],p[1]-1,p[2]):new Date(s)}

async function loadData(){
  try{
    const[dr,ar,gr]=await Promise.all([
      fetch(BASE+'deals.json').then(r=>r.json()),
      fetch(BASE+'ads_data.json').then(r=>r.json()).catch(()=>({})),
      fetch(BASE+'google_ads_data.json').then(r=>r.json()).catch(()=>({campaigns:[],totals:{}}))
    ]);
    DEALS=dr;ADS=ar;GADS=gr;
    // Set default period: 1 year ago
    const now=new Date();
    dtEnd=new Date(now);
    dtStart=new Date(now);
    dtStart.setDate(dtStart.getDate()-365);
    document.getElementById('dtStart').value=dtStart.toISOString().split('T')[0];
    document.getElementById('dtEnd').value=dtEnd.toISOString().split('T')[0];
    populateFilters();
    render();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading">Erro: '+e.message+'</div>';
  }
}

function populateFilters(){
  // Populate UTM dropdown
  const utms={};
  DEALS.forEach(d=>{if(d.c){const c=d.c.trim();if(c)utms[c]=(utms[c]||0)+1}});
  const utmSel=document.getElementById('utmFilter');
  utmSel.innerHTML='<option value="">Todas as UTMs ('+Object.keys(utms).length+' encontradas)</option>';
  Object.entries(utms).sort((a,b)=>b[1]-a[1]).forEach(([u,cnt])=>{
    const o=document.createElement('option');
    o.value=u;o.textContent=u+' ('+cnt+')';
    utmSel.appendChild(o);
  });

  // Populate fonte dropdown
  const fontes={};
  DEALS.forEach(d=>{if(d.fo){const f=d.fo.trim();if(f)fontes[f]=(fontes[f]||0)+1}});
  const fSel=document.getElementById('fonteFilter');
  fSel.innerHTML='<option value="">Todas as fontes ('+Object.keys(fontes).length+')</option>';
  Object.entries(fontes).sort((a,b)=>b[1]-a[1]).forEach(([f,cnt])=>{
    const o=document.createElement('option');
    o.value=f;o.textContent=f+' ('+cnt+')';
    fSel.appendChild(o);
  });
}

function inPeriod(dateStr){
  if(!dtStart||!dtEnd)return true;
  const d=parseD(dateStr);
  if(!d)return true;
  return d>=dtStart&&d<=dtEnd;
}

function getDeals(){
  return DEALS.filter(d=>{
    if(!inPeriod(d.dc))return false;
    const svcM=mSvc(d.c||'',curSvc)||mSvc(d.fo||'',curSvc)||mSvc(d.f||'',curSvc)||mSvc(d.n||'',curSvc);
    if(!svcM)return false;
    if(curUtm&&(d.c||'').trim()!==curUtm)return false;
    if(curFonte&&(d.fo||'').trim()!==curFonte)return false;
    const searchM=mSearch(d.c)||mSearch(d.fo)||mSearch(d.n)||mSearch(d.f);
    return searchM;
  });
}

function getAds(){
  if(curPlat==='GOOGLE')return[];
  // Aggregate daily data by campaign (period-filtered) instead of using all-time ADS.campaigns
  const daily=ADS.campaign_daily||[];
  const campMap={};
  daily.forEach(d=>{
    if(dtStart&&dtEnd){const dd=parseD(d.date);if(dd&&(dd<dtStart||dd>dtEnd))return}
    const n=d.campaign_name;
    if(!mSvc(n,curSvc)||!mSearch(n))return;
    if(!campMap[n])campMap[n]={campaign_name:n,spend:0,clicks:0,impressions:0,leads:0,messages:0,reach:0,cpc:0,cpl:0,ctr:0,landing_page_views:0,link_clicks:0};
    campMap[n].spend+=(d.spend||0);
    campMap[n].clicks+=(d.clicks||0);
    campMap[n].impressions+=(d.impressions||0);
    campMap[n].leads+=(d.leads||0);
    campMap[n].messages+=(d.messages||0);
    campMap[n].reach+=(d.reach||0);
    campMap[n].landing_page_views+=(d.landing_page_views||0);
    campMap[n].link_clicks+=(d.link_clicks||0);
  });
  // Calculate derived metrics
  return Object.values(campMap).map(c=>{
    c.cpc=c.clicks>0?c.spend/c.clicks:0;
    c.cpl=(c.leads+c.messages)>0?c.spend/(c.leads+c.messages):0;
    c.ctr=c.impressions>0?(c.clicks/c.impressions*100):0;
    return c;
  });
}

function getGoogleAds(){
  if(curPlat==='META')return[];
  const camps=GADS.campaigns||[];
  const filtered=camps.filter(c=>{
    return c.cost>0&&mSvc(c.campaign_name,curSvc)&&mSearch(c.campaign_name);
  });
  // Pro-rata: Google Ads data is all-time totals, so scale by selected period
  const ratio=gadsDateRatio();
  if(ratio<1){
    return filtered.map(c=>({...c,
      cost:(c.cost||0)*ratio,
      clicks:Math.round((c.clicks||0)*ratio),
      impressions:Math.round((c.impressions||0)*ratio),
      conversions:Math.round((c.conversions||0)*ratio)
    }));
  }
  return filtered;
}

function gadsDateRatio(){
  if(!dtStart||!dtEnd)return 1;
  const dr=GADS.date_range||'';
  if(!dr)return 1;
  const parts=dr.split(' a ');
  if(parts.length!==2)return 1;
  const totalStart=new Date(parts[0].trim());
  const totalEnd=new Date(parts[1].trim());
  const totalDays=Math.max(1,(totalEnd-totalStart)/(86400000));
  const selDays=Math.max(1,(dtEnd-dtStart)/(86400000));
  return Math.min(1,selDays/totalDays);
}

function getAdsDaily(){
  if(curPlat==='GOOGLE')return[];
  const daily=ADS.campaign_daily||[];
  return daily.filter(d=>{
    if(!mSvc(d.campaign_name,curSvc))return false;
    if(!mSearch(d.campaign_name))return false;
    if(dtStart&&dtEnd){
      const dd=parseD(d.date);
      if(dd&&(dd<dtStart||dd>dtEnd))return false;
    }
    return true;
  });
}

function render(){
  const fd=getDeals();
  const fa=getAds();
  const fad=getAdsDaily();
  const fga=getGoogleAds();

  // === META ADS METRICS (from daily for period accuracy) ===
  const metaSpend=fad.reduce((s,d)=>s+(d.spend||0),0);
  const metaClicks=fad.reduce((s,d)=>s+(d.clicks||0),0);
  const metaImpressions=fad.reduce((s,d)=>s+(d.impressions||0),0);
  const metaLeads=fad.reduce((s,d)=>s+(d.leads||0),0);
  const metaMsgs=fad.reduce((s,d)=>s+(d.messages||0),0);
  const metaLPV=fad.reduce((s,d)=>s+(d.landing_page_views||0),0);
  const metaLinkClicks=fad.reduce((s,d)=>s+(d.link_clicks||0),0);
  const metaReach=fad.reduce((s,d)=>s+(d.reach||0),0);

  // === GOOGLE ADS METRICS (from campaign totals) ===
  const gSpend=fga.reduce((s,c)=>s+(c.cost||0),0);
  const gClicks=fga.reduce((s,c)=>s+(c.clicks||0),0);
  const gImpressions=fga.reduce((s,c)=>s+(c.impressions||0),0);
  const gConversions=fga.reduce((s,c)=>s+(c.conversions||0),0);

  // === COMBINED METRICS ===
  const adSpend=metaSpend+gSpend;
  const adClicks=metaClicks+gClicks;
  const adImpressions=metaImpressions+gImpressions;
  const adLeads=metaLeads;
  const adMsgs=metaMsgs;
  const adLPV=metaLPV;
  const adLinkClicks=metaLinkClicks;
  const adReach=metaReach;
  const adConversions=metaLeads+metaMsgs+gConversions;
  const cpc=adClicks>0?adSpend/adClicks:0;
  const cpl=adConversions>0?adSpend/adConversions:0;

  // Platform label
  const platLabel=curPlat==='META'?'Meta Ads':curPlat==='GOOGLE'?'Google Ads':'Meta + Google Ads';

  // === CRM METRICS ===
  const totalDeals=fd.length;
  const vendidas=fd.filter(d=>d.e==='Vendida');
  const perdidas=fd.filter(d=>d.e==='Perdida');
  const emAnd=fd.filter(d=>d.e==='Em Andamento');
  const semContato=fd.filter(d=>d.eta==='Sem contato').length;

        if(!months[mk])months[mk]={invest:0,fat:0,fatPago:0,vendas:0,leads:0};
        months[mk].leads++;
        if(d.e==='Vendida'){months[mk].vendas++;months[mk].fat+=(d.v||0);if(isPaidSource(d))months[mk].fatPago+=(d.v||0)}
      });
      // Add ads spend by month
      fad.forEach(d=>{
        const dt=parseD(d.date);
        if(!dt)return;
        const mk=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
        if(!months[mk])months[mk]={invest:0,fat:0,fatPago:0,vendas:0,leads:0};
        months[mk].invest+=(d.spend||0);
      });
      const mKeys=Object.keys(months).sort();
      const mLabels=mKeys.map(k=>{const[y,m]=k.split('-');return['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(m)-1]+'/'+y.slice(2)});

      barChart=new Chart(bc,{
        type:'bar',
        data:{
          labels:mLabels,
          datasets:[
            {label:'Investimento',data:mKeys.map(k=>months[k].invest),backgroundColor:'#065a82',borderRadius:4,order:3},
            {label:'Fat. Trafego Pago',data:mKeys.map(k=>months[k].fatPago),backgroundColor:'#ea580c',borderRadius:4,order:2},
            {label:'Fat. Total',data:mKeys.map(k=>months[k].fat),backgroundColor:'#16a34a',borderRadius:4,order:1},
          ]
        },
        options:{
          responsive:true,
          plugins:{legend:{position:'top',labels:{font:{size:12}}},
            tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': R$ '+ctx.raw.toLocaleString('pt-BR',{minimumFractionDigits:2})}}}
          },
          scales:{
            y:{ticks:{callback:function(v){return'R$ '+v.toLocaleString('pt-BR')},font:{size:11}},grid:{color:'rgba(0,0,0,.05)'}},
            x:{ticks:{font:{size:11}},grid:{display:false}}
          }
        }
      });
    }
  },150);
}

// === EVENT LISTENERS ===
document.querySelectorAll('#svcBtns .btn-svc').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#svcBtns .btn-svc').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    curSvc=b.dataset.svc;
    render();
  });
});

document.querySelectorAll('#platBtns .btn-svc').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#platBtns .btn-svc').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    curPlat=b.dataset.plat;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input',e=>{search=e.target.value;render()});
document.getElementById('utmFilter').addEventListener('change',e=>{curUtm=e.target.value;render()});
document.getElementById('fonteFilter').addEventListener('change',e=>{curFonte=e.target.value;render()});

document.getElementById('dtStart').addEventListener('change',e=>{dtStart=e.target.value?new Date(e.target.value+'T00:00:00'):null;render()});
document.getElementById('dtEnd').addEventListener('change',e=>{dtEnd=e.target.value?new Date(e.target.value+'T23:59:59'):null;render()});

document.querySelectorAll('.preset').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const days=parseInt(b.dataset.days);
    const now=new Date();
    dtEnd=new Date(now);
    if(days===0){dtStart=new Date('2024-01-01')}
    else{dtStart=new Date(now);dtStart.setDate(dtStart.getDate()-days)}
    document.getElementById('dtStart').value=dtStart.toISOString().split('T')[0];
    document.getElementById('dtEnd').value=dtEnd.toISOString().split('T')[0];
    render();
  });
});

loadData();
</script>
